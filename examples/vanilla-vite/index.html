<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ollama ISV — Vanilla</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
      label { display: block; margin-top: 1rem; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 8px 16px; }
      pre { background: #f4f4f4; padding: 12px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Edge Ollama (Vanilla ISV demo)</h1>
    <p>Service <code>ollama</code> is hardcoded. You only enter the target host.</p>
    <label>Target host</label>
    <input id="host" placeholder="edge-gpu-1.your-entity.idr" />
    <div id="auth"></div>
    <button id="connect">Connect &amp; list models</button>
    <pre id="out">(not connected)</pre>
    <script type="module" src="/main.js"></script>
  </body>
</html>
